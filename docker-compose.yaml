services:
  db:
    image: postgres
    container_name: db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./backend/MessengerDBInit.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    restart: always

  redis:
    image: redis
    container_name: redis
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    restart: always

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: always

  backend-service:
    build:
      context: .
      dockerfile: DockerfileBackend
    container_name: backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_PORT: ${BACKEND_PORT}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_HOSTNAME: ${SMTP_HOSTNAME}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    expose:
      - "${BACKEND_PORT}"
    depends_on:
      - db
      - redis
      - minio
    restart: always

  frontend-service:
    build:
      context: .
      dockerfile: DockerfileFrontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: frontend
    expose:
      - "${FRONTEND_PORT}"
    environment:
      FRONTEND_STATIC_PORT: ${FRONTEND_PORT}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    depends_on:
      - backend-service
    restart: always

  nginx:
    build:
      context: .
      dockerfile: DockerfileNginx
    container_name: nginx
    ports:
      - ${NGINX_HTTP_PORT}:80
      - ${NGINX_HTTPS_PORT}:443
    environment:
      SSL_SERVER_NAME: ${SSL_SERVER_NAME}
      SSL_CERT_NAME: ${SSL_CERT_NAME}
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    depends_on:
      - frontend-service
      - backend-service
    restart: always

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    environment:
      SSL_SERVER_NAME: ${SSL_SERVER_NAME}
      SSL_SUBJECT_TYPE: ${SSL_SUBJECT_TYPE}
      SSL_CERT_NAME: ${SSL_CERT_NAME}
      SSL_CONTACT_EMAIL: ${SSL_CONTACT_EMAIL}
      CERTBOT_WEBROOT: /var/www/certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
      - ./certbot/run-certbot.sh:/run-certbot.sh:ro
    depends_on:
      - nginx
    entrypoint: ["/bin/sh", "/run-certbot.sh"]
    restart: always

volumes:
  postgres_data:
  minio_data:
  letsencrypt:
  certbot_webroot:
